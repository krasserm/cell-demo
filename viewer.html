<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cell Demo</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif;
         background: #111; color: #eee; }
  header { padding: 0.75rem 1.25rem; border-bottom: 1px solid #222; }
  header h1 { margin: 0; font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
  header span { color: #888; font-weight: 400; margin-left: 0.5rem; }
  main { display: grid; grid-template-rows: 1fr 1fr; gap: 1rem;
         padding: 1rem; height: calc(100vh - 4rem); box-sizing: border-box; }
  .panel { background: #1a1a1a; border: 1px solid #222; border-radius: 10px;
           overflow: hidden; display: flex; flex-direction: column; }
  .panel h2 { margin: 0; padding: 0.6rem 0.9rem; font-size: 0.75rem;
              font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
              color: #888; background: #161616; border-bottom: 1px solid #222; }
  .body { flex: 1; min-height: 0; }
  .body img { width: 100%; height: 100%; object-fit: contain; display: block; }
  model-viewer { width: 100%; height: 100%; background: #1a1a1a; --poster-color: #1a1a1a; }
</style>
</head>
<body>
<header><h1>Cell Demo<span>Nano Banana 2 → Tripo → model-viewer</span></h1></header>
<main>
  <div class="panel">
    <h2>Concept image</h2>
    <div class="body"><img src="output/concept.png" alt="concept image"></div>
  </div>
  <div class="panel">
    <h2>3D model</h2>
    <div class="body">
      <model-viewer
        src="output/model.glb"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1.1">
      </model-viewer>
    </div>
  </div>
</main>
</body>
</html>
